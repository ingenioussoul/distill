<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Distill — An Ingenious Soul Product</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Distill">
<meta name="theme-color" content="#0F0F0D">
<meta name="mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,200;0,300;0,400;0,500;1,300;1,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}
input{-webkit-appearance:none;appearance:none}

:root{
  --bg:#f5f0e8;--bg-dark:#ede6d6;--paper:#F7F4EE;--white:#ffffff;--bg-ink:#0F0F0D;
  --ink:#1a1612;--ink-mid:#4a4238;--ink-light:#8a7d6e;--ink-ghost:#3A3830;
  --accent:#C4500A;--ochre:#c4823a;--sienna:#9b4f2a;
  --rule:#d4c9b4;--border:#E0DDD6;
  --code-bg:#1A1916;--code-text:#E8E4DC;--code-comment:#5A5750;--code-key:#C4823A;--code-val:#8CB88A;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-sans:'DM Sans',sans-serif;
  --font-mono:'DM Mono',monospace;
}

@keyframes obWord{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes screenIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes frameIn{from{opacity:0;transform:translateY(10px) scale(.95)}to{opacity:1;transform:none}}
@keyframes scan{0%{transform:translateY(0);opacity:0}12%{opacity:1}88%{opacity:1}100%{transform:translateY(340px);opacity:0}}
@keyframes shutterPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 0 13px rgba(255,255,255,.05)}}
@keyframes burst{0%{transform:scale(.4);opacity:.55}100%{transform:scale(2.6);opacity:0}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes drawUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes caret{0%,100%{opacity:1}50%{opacity:0}}
@keyframes wave{0%,100%{transform:scaleY(.22)}50%{transform:scaleY(1)}}
@keyframes holdPulse{0%,100%{box-shadow:0 0 0 0 rgba(196,80,10,.32)}50%{box-shadow:0 0 0 18px rgba(196,80,10,0)}}
@keyframes voiceIn{from{opacity:0;transform:translate(-26px,26px) scale(.97)}to{opacity:1;transform:none}}
@keyframes nudgeDiag{0%,100%{transform:translate(0,0)}50%{transform:translate(4px,-4px)}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.001s!important}}

/* ── App root — single fullscreen container ── */
#app-root{
  position:fixed;inset:0;
  height:-webkit-fill-available;
  overflow:hidden;background:#0F0F0D;
  --bg:#0F0F0D;--bg-dark:rgba(247,244,238,.08);--border:rgba(247,244,238,.14);
  --rule:rgba(247,244,238,.14);--ink:#F4F1EB;--ink-mid:rgba(247,244,238,.72);
  --ink-light:rgba(247,244,238,.55);--paper:#F7F4EE;--accent:#C4500A;
  --sienna:#9b4f2a;--ochre:#c4823a;--code-bg:#1A1916;--code-text:#E8E4DC;
  --code-comment:#5A5750;--code-key:#C4823A;--code-val:#8CB88A;--bg-ink:#0F0F0D;
  --danger:#c0392b;--danger-text:#ffffff;
  --font-display:'DM Serif Display',Georgia,serif;
  --font-sans:'DM Sans',sans-serif;--font-mono:'DM Mono',monospace;
  font-family:var(--font-sans);font-weight:300;color:var(--ink);
}
#app-root>*{width:100%;max-width:100%;box-sizing:border-box;overflow-x:hidden}
</style>
</head>
<body>
<div id="app-root"></div>

<script>
// ─── App ───────────────────────────────────────────────────────────────────
const A={
  s:{
    screen:'feed',captureMode:'camera',voiceState:'idle',voiceText:'',
    draftPhoto:null,draftInsight:'',draftThemeId:null,
    activeThemeId:null,pressureData:null,pressureLoading:false,killConfirm:false,cameraFailed:false,toast:null,
    buildStarted:false,buildTargetLabel:'',
    launchData:null,launchLoading:false,
    voiceConvPhase:null,voiceInitial:'',voiceQuestion:'',
    captures:[],themes:[],heldBriefs:[],
  },
  stream:null,videoEl:null,_t:null,_viv:null,
  _voiceFull:'A spinner with no end — am I frozen, or thinking?',
  _recognition:null,

  set(partial){
    const prev={...this.s};
    this.s=typeof partial==='function'?{...this.s,...partial(this.s)}:{...this.s,...partial};
    const wasCam=prev.screen==='capture'&&prev.captureMode==='camera';
    const isCam=this.s.screen==='capture'&&this.s.captureMode==='camera';
    if(isCam&&!wasCam)this.startCamera();
    if(wasCam&&!isCam)this.stopCamera();
    this.render();
  },

  toast(msg){
    this.set({toast:msg});
    clearTimeout(this._t);
    this._t=setTimeout(()=>this.set({toast:null}),2600);
  },

  startCamera(){
    if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){this.set({cameraFailed:true});return;}
    clearTimeout(this._camTimer);
    this._camTimer=setTimeout(()=>{if(!this.stream)this.set({cameraFailed:true});},1800);
    navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false})
      .then(s=>{
        clearTimeout(this._camTimer);this.stream=s;
        if(this.videoEl){try{this.videoEl.srcObject=s;const p=this.videoEl.play&&this.videoEl.play();if(p&&p.catch)p.catch(()=>{});}catch(e){}}
        this.set({cameraFailed:false});
      })
      .catch(()=>{clearTimeout(this._camTimer);this.set({cameraFailed:true});});
  },
  stopCamera(){
    clearTimeout(this._camTimer);
    if(this.stream){try{this.stream.getTracks().forEach(t=>t.stop());}catch(e){}this.stream=null;}
  },

  shutter(){
    let photo=null;const v=this.videoEl;
    try{
      if(this.stream&&v&&v.videoWidth){
        const cv=document.createElement('canvas');
        cv.width=v.videoWidth;cv.height=v.videoHeight;
        cv.getContext('2d').drawImage(v,0,0);
        photo=cv.toDataURL('image/jpeg',.82);
      }
    }catch(e){}
    this.set({draftPhoto:photo,draftInsight:'',draftThemeId:null,screen:'captureInsight'});
  },

  voiceStart(){
    if(this.s.voiceState==='listening')return;
    this.set({voiceState:'listening',voiceText:''});
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){
      this.set({voiceState:'idle'});
      this.toast('Speech not supported on this browser');
      return;
    }
    const r=new SR();
    r.continuous=true;
    r.interimResults=true;
    r.lang='en-US';
    this._recognition=r;
    r.onresult=e=>{
      let text='';
      for(let i=0;i<e.results.length;i++) text+=e.results[i][0].transcript;
      this.set({voiceText:text});
    };
    r.onerror=()=>{this.set({voiceState:'idle',voiceText:''});};
    r.start();
  },
  voiceEnd(){
    if(this.s.voiceState!=='listening')return;
    const text=(this.s.voiceText||'').trim();
    if(this._recognition){try{this._recognition.stop();}catch(e){}this._recognition=null;}
    if(!text){this.set({voiceState:'idle',voiceText:''});return;}

    if(this.s.voiceConvPhase===null){
      // Initial capture — ask AI for one sharpening question
      this.set({voiceState:'idle',voiceText:'',voiceInitial:text,voiceConvPhase:'thinking'});
      this._askQuestion(text);
    } else if(this.s.voiceConvPhase==='questioning'){
      // Answer — distill to insight and auto-save
      this.set({voiceState:'idle',voiceText:'',voiceConvPhase:'saving'});
      this._distillInsight(this.s.voiceInitial,this.s.voiceQuestion,text);
    }
  },

  async _askQuestion(initial){
    try{
      const r=await fetch('/api/capture/converse',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({initial})});
      const d=await r.json();
      this.set({voiceQuestion:d.question||'What specifically felt broken about that?',voiceConvPhase:'questioning'});
    }catch(e){
      // Fallback — go straight to insight screen with initial text
      this.set({draftPhoto:null,draftInsight:this.s.voiceInitial,draftThemeId:null,
        screen:'captureInsight',captureMode:'camera',voiceState:'idle',voiceConvPhase:null,voiceInitial:'',voiceQuestion:''});
    }
  },

  async _distillInsight(initial,question,answer){
    try{
      const r=await fetch('/api/capture/distill',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({initial,question,answer})});
      const d=await r.json();
      const insight=d.insight||initial;
      this.set({draftPhoto:null,draftInsight:insight,draftThemeId:null});
      await this.save();
      this.set({screen:'feed',captureMode:'camera',voiceState:'idle',voiceConvPhase:null,voiceInitial:'',voiceQuestion:'',voiceText:''});
    }catch(e){
      // Fallback — drop to insight screen with the initial text
      this.set({draftPhoto:null,draftInsight:initial,draftThemeId:null,
        screen:'captureInsight',captureMode:'camera',voiceState:'idle',voiceConvPhase:null,voiceInitial:'',voiceQuestion:''});
    }
  },

  submitTextAnswer(){
    const inp=document.getElementById('voice-text-answer');
    const text=(inp?inp.value:'').trim();
    if(!text)return;
    this.set({voiceConvPhase:'saving'});
    this._distillInsight(this.s.voiceInitial,this.s.voiceQuestion,text);
  },

  save(){
    const insight=(this.s.draftInsight||'').trim()||'Something felt off, and I noticed';
    this.set(s=>{
      const themes=s.themes.map(t=>({...t}));
      const order=Math.max(...s.captures.map(c=>c.order))+1;
      const tid=s.draftThemeId;
      const tone=tid==='t1'?'#C4500A':tid==='t2'?'#9b4f2a':tid==='t3'?'#2E2A22':'#3A3830';
      const cap={id:'c'+order,order,frame:'FR.0'+String(order).padStart(2,'0'),tone,insight,themeId:tid,time:'just now',photo:s.draftPhoto};
      const captures=[cap,...s.captures];
      let grad=null;
      if(tid){const t=themes.find(x=>x.id===tid);if(t){t.count+=1;if(t.count>=t.threshold&&!t.graduated){t.graduated=true;grad=t.id;}}}
      return {captures,themes,draftPhoto:null,draftInsight:'',draftThemeId:null,
        screen:grad?'graduation':'feed',activeThemeId:grad||s.activeThemeId};
    });
    if(this.s.screen==='feed')this.toast('Capture saved · pattern updated');
  },

  async analyzeThemes(){
    if(this.s.themesLoading)return;
    this.set({themesLoading:true,themesMessage:null,themes:[]});
    try{
      const r=await fetch('/api/themes/analyze',{method:'POST',credentials:'include'});
      const d=await r.json();
      if(d.themes&&d.themes.length>0){
        this.set({themes:d.themes,themesLoading:false,themesMessage:null});
      } else {
        this.set({themes:[],themesLoading:false,themesMessage:d.message||'No clear patterns yet — keep capturing.'});
      }
    }catch(e){
      this.set({themesLoading:false,themesMessage:'Could not analyze right now — try again.'});
    }
  },

  async deleteCapture(id){
    this.set(s=>({captures:s.captures.filter(c=>c.id!==id)}));
    try{
      await fetch(`/api/captures/${id}`,{method:'DELETE',credentials:'include'});
    }catch(e){}
  },

  _knownStack:['express 5','better auth','drizzle','neon','railway','vite','react','drizzle + neon','drizzle · neon'],

  _stackTags(at){
    const pd=this.s.pressureData;
    const tags=pd&&pd.stack&&pd.stack.length?pd.stack:['Express 5','Better Auth','Drizzle · Neon','Railway'];
    return tags.map(s=>{
      const isNew=!this._knownStack.some(k=>s.toLowerCase().includes(k)||k.includes(s.toLowerCase()));
      return isNew
        ?`<span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;color:#E8A87C;border:1px solid rgba(232,168,124,0.5);padding:5px 9px" title="New suggestion">${s}</span>`
        :`<span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.06em;color:var(--ink-mid);border:1px solid var(--border);padding:5px 9px">${s}</span>`;
    }).join('');
  },

  async copyBrief(target){
    const at=this.activeTheme();
    const pd=this.s.pressureData||{};
    const allStack=(pd.stack||['Express 5','Better Auth','Drizzle · Neon','Railway']);
    const knownBase=['Express 5','Better Auth','Drizzle + Neon','Drizzle · Neon','Railway','Vite','React','Stripe'];
    const newStack=allStack.filter(s=>!knownBase.some(k=>s.toLowerCase().includes(k.toLowerCase())||k.toLowerCase().includes(s.toLowerCase())));
    const fullStack=allStack.join(' · ');

    let prompt;
    if(target==='claude'){
      prompt=`Build this: ${at.name}\n\nThe friction: ${at.blurb}\nWho it's for: ${pd.forWho||''}\nSmallest version: ${pd.smallestVersion||''}\nStack: ${fullStack}\n\nStart with the schema and API routes. Keep it to the smallest version — nothing extra.`;
    } else {
      const extras=newStack.length?`\nAdditional dependencies needed for this product: ${newStack.join(', ')}`:'\nNo extra dependencies — the Stack covers everything.';
      prompt=`I've cloned Ingenious Stack (Express 5, Better Auth, Drizzle + Neon, Stripe already wired and running).\n\nBuild "${at.name}" on top of it.\n\nThe friction: ${at.blurb}\nWho it's for: ${pd.forWho||''}\nSmallest version: ${pd.smallestVersion||''}\n${extras}\n\nSkip auth, DB connection, and server setup — those are done. Add only what's specific to this product: the new schema tables, API routes, and any product-specific logic. Keep it to the smallest version.`;
    }

    try{
      await navigator.clipboard.writeText(prompt);
      this.set({buildStarted:true,buildTargetLabel:target==='claude'?'Claude Code':'Ingenious Stack'});
      this.toast('Brief copied to clipboard');
    }catch(e){
      this.set({buildStarted:true,buildTargetLabel:target==='claude'?'Claude Code':'Ingenious Stack'});
    }
  },

  async signOut(){
    try{
      await fetch('/api/auth/sign-out',{method:'POST',credentials:'include'});
    }catch(e){}
    window.location.reload();
  },

  async generateLaunch(){
    const at=this.activeTheme();
    const pd=this.s.pressureData||{};
    if(!at.name)return;
    this.set({launchLoading:true,launchData:null,screen:'launch'});
    try{
      const r=await fetch('/api/build/launch',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        themeName:at.name,themeBlurb:at.blurb,
        forWho:pd.forWho||null,smallestVersion:pd.smallestVersion||null,frictionVerdict:pd.frictionVerdict||null,
      })});
      const data=await r.json();
      this.set({launchData:data,launchLoading:false});
    }catch(e){
      this.set({launchLoading:false});
      this.toast('Could not generate copy — try again');
    }
  },

  async regenerateBroadcast(){
    const at=this.activeTheme();
    const pd=this.s.pressureData||{};
    if(!at.name)return;
    this.set(s=>({launchData:s.launchData?{...s.launchData,broadcast:null,broadcastChars:0}:null,launchLoading:true}));
    try{
      const r=await fetch('/api/build/launch',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        themeName:at.name,themeBlurb:at.blurb,
        forWho:pd.forWho||null,smallestVersion:pd.smallestVersion||null,frictionVerdict:pd.frictionVerdict||null,
      })});
      const data=await r.json();
      this.set(s=>({launchData:{...s.launchData,...data},launchLoading:false}));
    }catch(e){
      this.set({launchLoading:false});
      this.toast('Could not regenerate — try again');
    }
  },

  async copyText(text,label){
    try{ await navigator.clipboard.writeText(text); }catch(e){}
    this.toast(`${label} copied`);
  },

  async manageBilling(){
    try{
      const r=await fetch('/api/stripe/portal',{method:'POST',credentials:'include'});
      const d=await r.json();
      if(d.url) window.location.href=d.url;
    }catch(e){ this.toast('Could not open billing portal'); }
  },

  async holdTheme(){
    const at=this.activeTheme();
    const pd=this.s.pressureData||{};
    // Navigate immediately — save happens in background
    this.set({screen:'themes',killConfirm:false,pressureData:null});
    this.toast('Held — saved to your build screen');
    try{
      const r=await fetch('/api/briefs',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        themeName:at.name,themeBlurb:at.blurb,
        forWho:pd.forWho||null,smallestVersion:pd.smallestVersion||null,
        frictionVerdict:pd.frictionVerdict||null,stack:pd.stack||[],
      })});
      const saved=await r.json();
      this.set(s=>({heldBriefs:[saved,...s.heldBriefs]}));
    }catch(e){}
  },

  async killTheme(){
    const at=this.activeTheme();
    const ids=(at.captures||[]).map(c=>c.id).filter(Boolean);
    if(ids.length){
      try{
        await fetch('/api/themes/kill',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({captureIds:ids})});
      }catch(e){}
    }
    this.set(s=>({
      captures:s.captures.filter(c=>!ids.includes(c.id)),
      themes:s.themes.filter(t=>t.id!==s.activeThemeId),
      screen:'themes',killConfirm:false,activeThemeId:null,pressureData:null,
    }));
    this.toast('Killed — idea and captures cleared');
  },

  async loadHeldBriefs(){
    try{
      const r=await fetch('/api/briefs',{credentials:'include'});
      const data=await r.json();
      this.set({heldBriefs:data});
    }catch(e){}
  },

  async deleteBrief(id){
    this.set(s=>({heldBriefs:s.heldBriefs.filter(b=>b.id!==id)}));
    try{ await fetch(`/api/briefs/${id}`,{method:'DELETE',credentials:'include'}); }catch(e){}
  },

  async pressureTest(){
    const at=this.activeTheme();
    if(!at.name)return;
    this.set({pressureLoading:true,pressureData:null,screen:'pressure'});
    try{
      const r=await fetch('/api/themes/pressure',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({themeName:at.name,themeBlurb:at.blurb,captures:at.captures||[]})});
      const data=await r.json();
      this.set({pressureData:data,pressureLoading:false});
    }catch(e){
      this.set({pressureLoading:false});
    }
  },

  reset(){
    this.stopCamera();
    clearInterval(this._viv);
    this.s={screen:'feed',captureMode:'camera',voiceState:'idle',voiceText:'',
      draftPhoto:null,draftInsight:'',draftThemeId:null,
      activeThemeId:null,pressureData:null,pressureLoading:false,
      killConfirm:false,cameraFailed:false,toast:null,
      themesLoading:false,themesMessage:null,
      buildStarted:false,buildTargetLabel:'',
      launchData:null,launchLoading:false,
      voiceConvPhase:null,voiceInitial:'',voiceQuestion:'',
      captures:[],themes:[],heldBriefs:this.s.heldBriefs||[]};
    this.render();
  },

  // ── Helpers ──────────────────────────────────────────────────────────────
  themeColor(id){return id==='t1'?'var(--accent)':id==='t2'?'var(--sienna)':id==='t3'?'var(--ochre)':'var(--ink-light)'},
  themeName(id){const t=this.s.themes.find(x=>x.id===id);return t?t.name:'Unfiled'},
  activeTheme(){
    const at=this.s.themes.find(t=>t.id===this.s.activeThemeId);
    if(!at)return{name:'',blurb:'',count:0,captures:[]};
    return at;
  },
  phaseHTML(active,dark){
    const muted=dark?'rgba(247,244,238,.4)':'var(--ink-light)';
    return['See','Think','Build','Repeat'].map((st,i)=>{
      const on=st===active;
      return(i>0?`<span style="color:${muted};font-size:7px">·</span>`:'')+
        `<span style="font-family:var(--font-mono);font-size:${on?'clamp(13px,3.5vw,18px)':'clamp(11px,2.8vw,15px)'};letter-spacing:0.18em;text-transform:uppercase;color:${on?'var(--accent)':muted};transition:color .3s">${st}</span>`;
    }).join('');
  },

  // ── Screens ──────────────────────────────────────────────────────────────
  screenOnboarding(){
    return`<div style="height:100%;display:flex;flex-direction:column;background:var(--bg-ink);animation:screenIn .5s ease both">
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:48px 36px 36px">
    <div style="font-family:var(--font-display);font-size:38px;line-height:1;color:var(--paper);margin-bottom:6px">Distill<span style="color:var(--accent)">.</span></div>
    <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(247,244,238,.35);margin-bottom:48px">An Ingenious Soul product</div>
    <div style="font-family:var(--font-display);font-size:20px;line-height:1.35;color:var(--paper);margin-bottom:48px">Every friction you feel<br>is a product you haven't<br><span style="font-style:italic;color:var(--accent)">built yet.</span></div>
    <div style="display:flex;flex-direction:column;gap:22px">
      <div style="display:flex;gap:16px;align-items:flex-start">
        <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);flex-shrink:0;padding-top:2px">SEE</div>
        <div style="font-size:13px;line-height:1.5;color:rgba(247,244,238,.65)">Catch the friction the moment you feel it — photo, voice, or one line.</div>
      </div>
      <div style="display:flex;gap:16px;align-items:flex-start">
        <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(247,244,238,.35);flex-shrink:0;padding-top:2px">THINK</div>
        <div style="font-size:13px;line-height:1.5;color:rgba(247,244,238,.65)">Distill watches the feed and finds what keeps coming back.</div>
      </div>
      <div style="display:flex;gap:16px;align-items:flex-start">
        <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(247,244,238,.35);flex-shrink:0;padding-top:2px">BUILD</div>
        <div style="font-size:13px;line-height:1.5;color:rgba(247,244,238,.65)">When a pattern recurs enough, it graduates into a brief ready to build.</div>
      </div>

    if(vcp==='thinking'){

  render(){
    const root=document.getElementById('app-root');
    if(!root)return;
    const screen=this.s.screen;
    let html='';
    if(screen==='onboarding') html=this.screenOnboarding();
    else if(screen==='feed') html=this.screenFeed();
    else if(screen==='capture') html=this.screenCapture();
    else if(screen==='captureInsight') html=this.screenInsight();
    else if(screen==='themes') html=this.screenThemes();
    else if(screen==='graduation') html=this.screenGraduation();
    else if(screen==='pressure') html=this.screenPressure();
    else if(screen==='brief') html=this.screenBrief();
    else if(screen==='launch') html=this.screenLaunch();
    root.innerHTML=html;
    this._attachEvents();
  },

  _attachEvents(){
    const s=this.s;

    // Camera feed
    if(s.screen==='capture'&&s.captureMode==='camera'){
      const vid=document.getElementById('cam-feed');
      if(vid){
        this.videoEl=vid;
        if(this.stream){try{vid.srcObject=this.stream;const p=vid.play&&vid.play();if(p&&p.catch)p.catch(()=>{});}catch(e){}}
      }

      // Shutter
      const shutterBtn=document.getElementById('shutter-btn');
      if(shutterBtn)shutterBtn.addEventListener('click',()=>this.shutter());

      // Swipe gesture on gesture area
      const ga=document.getElementById('cam-gesture-area');
      if(ga){
        let gx,gy;
        ga.addEventListener('pointerdown',e=>{gx=e.clientX;gy=e.clientY;});
        ga.addEventListener('pointerup',e=>{
          const dx=e.clientX-gx,dy=e.clientY-gy;
          if(dx>40&&dy<-40)this.set({captureMode:'voice',voiceState:'idle',voiceText:''});
        });
      }
    }

    // Voice hold button
    if(s.screen==='capture'&&s.captureMode==='voice'){
      const btn=document.getElementById('voice-hold-btn');
      if(btn){
        btn.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();this.voiceStart();});
        btn.addEventListener('pointerup',e=>{e.stopPropagation();this.voiceEnd();});
        btn.addEventListener('pointerleave',()=>{if(this.s.voiceState==='listening')this.voiceEnd();});
      }
      // Voice swipe back
      const vga=document.getElementById('voice-gesture-area');
      if(vga){
        let gx,gy;
        vga.addEventListener('pointerdown',e=>{gx=e.clientX;gy=e.clientY;});
        vga.addEventListener('pointerup',e=>{
          const dx=e.clientX-gx,dy=e.clientY-gy;
          if(dx<-40&&dy>40)this.set({captureMode:'camera',voiceState:'idle',voiceText:''});
        });
      }
    }

    // Insight input live update
    if(s.screen==='captureInsight'){
      const inp=document.getElementById('insight-input');
      if(inp){
        inp.addEventListener('input',e=>{
          this.s.draftInsight=e.target.value;
        });
      }
    }

    // Camera start when entering capture+camera
    if(s.screen==='capture'&&s.captureMode==='camera'&&!this.stream&&!this.s.cameraFailed){
      // Already handled in set() via startCamera call, but ensure video is attached
    }
  }
};

// Wire captures to API
A.loadCaptures = async function(){
  try {
    const r = await fetch('/api/captures', { credentials: 'include' });
    if(!r.ok) return;
    const rows = await r.json();
    if(rows.length > 0){
      this.s.captures = rows.map((c,i) => ({
        id: c.id,
        order: rows.length - i,
        frame: 'FR.' + String(rows.length - i).padStart(3,'0'),
        tone: '#3A3830',
        insight: c.title || c.raw || '',
        themeId: null,
        time: new Date(c.createdAt).toLocaleDateString('en-US',{month:'short',day:'numeric'}),
        photo: c.imageUrl || null,
      }));
    }
  } catch(e){}
};

      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ type: this.s.draftPhoto ? 'photo' : 'text', title: insight, raw: insight }),
    });
  } catch(e){}
  _origSave();
};

// Boot
Auth.boot();
</script>
